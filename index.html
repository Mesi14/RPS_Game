<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Rock Paper Scissor</title>
    </head>
    <body>
        <main>
            <h1>Rock Paper Scissors</h1>
            <h2 id="humanChoiceText"></h2>
            <div id="humanChoices">
                <button class="buttons" id="rock">Rock</button>
                <button class="buttons" id="paper">Paper</button>
                <button class="buttons" id="scissors">Scissors</button>  
            </div>
            <div id="results">
                <div class="playerScore">
                    <h2>Player</h2>
                    <p class="scores" id="pScore">0</p>
                </div>       
                <div class="computerScore">
                    <h2>Computer</h2>
                    <p class="scores" id="cScore">0</p>
                </div>
            </div>         
        </main>
        <script src="game.js"></script> 
    </body>
</html>
